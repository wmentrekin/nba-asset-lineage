artifact: requirements
feature: "frontend-vision-reset"
status: draft
owner_skill: discover

summary:
  problem: "The current Stage 8 Astro frontend is a contract-driven scaffold built around a compact sample contract. It proves a technical rendering path, but it is materially short of the intended final public-facing Memphis asset-lineage experience in visual ambition, information density, chronology, and real-data integration."
  motivation: "The final product is intended to be a polished, public-facing Memphis asset graph that can stand on its own visually and interactively before heavier editorial or chapter-copy layers are added."
  requested_outcome: "Define a clearer product and frontend direction for a replacement or major reset of the current Stage 8 slice, strong enough for detailed planning across graph design, real-data integration, long-form page structure, rendering architecture, and phased implementation."

goals:
  - "Define the target experience as a public-facing Memphis asset-graph product rather than an internal engineering demo."
  - "Define the core visual system as a chronologically scrolling asset graph spanning the full Memphis ten-year story."
  - "Clarify how the final frontend should consume the full real Stage 6 presentation data and optional Stage 7 editorial overlays."
  - "Define the page structure around a dominant graph canvas, while treating narrative copy/chapter copy as secondary to the graph architecture for this phase."
  - "Capture the required visual, interactive, technical, and editorial characteristics of a frontend closer to the final vision."
  - "Produce requirements that are strong enough for a later planning pass to decompose into phased implementation work."

non_goals:
  - "Do not design the full implementation plan yet."
  - "Do not commit to final visual comps, components, or rendering architecture in this discovery pass."
  - "Do not expand or change Stage 1-7 data contracts unless requirements work shows a true contract gap."
  - "Do not assume the current Stage 8 Astro page should be preserved beyond what is explicitly retained."

constraints:
  technical:
    - "Frontend must fit within an Astro website."
    - "Frontend must render directly from the presentation and editorial contracts rather than invent lineage semantics client-side."
    - "Continuity identity must respect canonical.asset.asset_id rather than player_id."
    - "The first implementation should be SVG-first. Canvas or hybrid rendering is out of scope unless later full-dataset hardening proves it necessary."
    - "Current machine runtime note: Astro requires Node >= 18.20.8."
  product:
    - "Scope is Memphis Grizzlies only."
    - "First public release target is a polished standalone story page."
    - "The page should be graph-dominant rather than a generic vertical article with an embedded chart section."
    - "Primary navigation should be a narrative horizontal-scroll experience supported by a minimap that can jump to specific points in time."
    - "The frontend should use a repo-local generated data workflow rather than checked-in generated artifacts or runtime data fetching."
    - "Narrative/editorial layering is lower priority than getting the core graph architecture right."
    - "The core graph should keep the active 15-man roster, up to 3 two-way assets, and future draft assets visible."
    - "Lower-priority temporary roster states such as 10-day structures may be collapsed or deferred in the first serious frontend."
    - "Future draft assets may be visually lighter or thinner than player strands while still remaining part of the same continuity system."
    - "Mobile-specific optimization is not a priority in this discovery pass."
    - "Editorial overlays are additive and must not alter canonical truth."
    - "The frontend should validate the data model, not hide model weaknesses."
  process:
    - "Requirements must stay separate from design and implementation planning."
    - "Current discovery should be strong enough for a later $plan pass without reopening basic task definition."

assumptions:
  - "The current Stage 8 Astro slice should be treated as a useful prototype, not as the final product direction."
  - "A future implementation may require new exports, new frontend architecture, and likely a substantial replacement of the current visualization layer."
  - "The next serious frontend slice should use the full real Memphis dataset rather than sample data."
  - "Visual references or generated mock imagery may be useful during planning, but they should be used to compare and narrow directions rather than to bypass requirements definition."
  - "First-pass lane prominence can use tenure with team as the default ordering heuristic, with later editorial refinement deferred."
  - "Names and possibly lightweight identity markers should travel with strands rather than living only in fixed row labels or tooltips."
  - "A separate layout-oriented contract on top of Stage 6 is now part of the intended architecture, provided it remains limited to graph-composition truth rather than lineage truth."

