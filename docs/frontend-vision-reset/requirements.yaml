research:
  repo_findings:
    - "Current frontend is a single-page Astro slice with one route, SVG timeline scene, chapter list, filters, zoom/date controls, and inspector."
    - "Current frontend uses a compact tracked sample contract JSON rather than live or generated Stage 6/7 exports."
    - "No preexisting maintained website structure exists in the active repo beyond the new Astro frontend."
    - "Strongest product docs define the final target as a polished public-facing editorial/data-journalism experience."
    - "Scrollytelling/chaptering is a confirmed first-release requirement, not optional future scope."
    - "The frontend is constrained to Astro, but rendering technology remains open."
    - "The frontend must render contract semantics directly and avoid hidden lineage inference."
    - "Current sample data is too small to prove final information density, performance, or narrative scale."
    - "Stage 6 already defines three lane groups that align with the current product vision: main roster, two-way, and future picks."
    - "The current presentation export already provides explicit nodes, edges, and lanes; the frontend is not expected to infer continuity."
    - "Current lane assignment is deterministic interval packing, not importance-aware ordering."
    - "Current editorial overlays can focus chapters and prioritize annotations, but they do not define lane order, slot prominence, or collapse behavior."
  user_direction:
    - "Primary visual target is the whole ten-year Memphis story rather than a narrowly bounded vignette."
    - "Primary artifact should be a standalone graph-dominant story page."
    - "Horizontal time unit should be one calendar day, with chronological flow and likely bottom-axis tick marks."
    - "Each asset should keep its own continuous visual strand across time."
    - "The graph should show clean junctions that connect nearby lanes through transactions rather than collapsing many assets into one blob."
    - "When outgoing assets leave, surrounding lanes should fluidly compact upward and incoming assets may enter from lower slots."
    - "More important players should generally stay nearer the top of the graph."
    - "Lane positions should fluidly reflow when transactions happen rather than staying rigidly fixed."
    - "All events on the same day can be treated as happening at the same time for graph-layout purposes."
    - "Same-day trade flows can be visually combined into one transaction moment from the Memphis perspective."
    - "Labels should live directly on asset strands."
    - "A minimap or similar secondary navigation aid is acceptable."
    - "Seasonal or major-date segmentation will matter later, but core graph behavior takes priority over heavier storytelling markers in this phase."
    - "Future picks can be visually thinner than player strands."
    - "Each draft pick must remain an individual visible strand rather than being pooled into aggregated draft-capital shapes."
    - "Optional small headshots or identity icons are desirable as lane-bound markers that stay near the left edge of the visible chart, slide vertically as lanes reflow, and disappear when the asset leaves the graph."
    - "Pick protections and swaps should be treated as properties of an individual pick strand rather than as separate asset flows."
    - "Pick-to-player conversion should read visually like a one-to-one transition at the draft: the pick strand enters the draft event and a player strand exits it."
    - "When a strand is too short or compressed to carry a readable inline name, the left traveling identity marker should remain visible."
    - "Traveling identity markers should default to headshot plus text."
    - "The full ten-year graph should exist as one chronology, but the default viewport should reveal only a bounded horizontal slice at a time rather than the entire span at once."
    - "The default visible window should be roughly 120 to 180 days, with zoom controlling narrower or broader windows."
    - "Chronology should use one day as the base unit, monthly minor ticks, season-boundary major ticks, and optional later overlays for major league dates such as the draft, lottery, deadline, and free agency."
    - "The next serious frontend phase should use the full real dataset."
    - "Broader publication-shell concerns can be deferred; focus is the story page itself."
    - "Narrative copy matters less right now than the visual and technical architecture of the graph."
    - "The closest current visual metaphor is a Sankey-like asset graph rather than a simple slot timeline."
    - "Vertical-scroll article framing is not the desired primary composition."
    - "The renderer choice for the first implementation is SVG-first."
    - "The real-data workflow should be a repo-local generated export step consumed by Astro."
  platform_findings: []
  visual_exploration_findings:
    - "The preferred direction is a wide, chronology-first, Sankey-like lineage graph with compact transaction junctions, persistent asset continuity, tiered vertical bands, and clear pick/player differentiation."
    - "The strongest structure reference is the sankey-sports-timeline concept, especially for clean nearby junctions, upward compaction, subtle time ticks, and editorial polish."
    - "The strongest readability reference is the dense infographic concept, especially for fixed lane regions, compact event markers, and full-decade information density."
    - "ESPN-style editorial cues are useful for tone and orientation, but not if the graph becomes one section within a broader vertical article composition."
    - "Lightweight era grouping above the graph is useful as an orientation layer even though the minimalist direction is otherwise not preferred."
    - "Traveling identity on the strand is preferred over fixed left-side row labels."

acceptance_criteria:
  - "Requirements clearly distinguish the final target product from the current Stage 8 prototype."
  - "Requirements define the intended data source strategy for the real frontend slice using the full real dataset."
  - "Requirements define the intended page structure as a graph-dominant story page rather than a generic article with an embedded chart."
  - "Requirements define the primary navigation model as horizontal narrative traversal with minimap-assisted jumping."
  - "Requirements freeze the first implementation architecture strongly enough to avoid renderer or data-delivery guesswork during planning."
  - "Requirements define the desired graph structure closely enough to guide planning of lanes, transactions, chronology, and interaction."
  - "Requirements define the always-visible asset classes and the acceptable collapse/defer rules for lower-priority temporary assets."
  - "Requirements make clear which desired graph behaviors are already supported by Stage 6 outputs and which would require new contract or export work."
  - "Requirements define the intended reading model for traveling strand labels or identity markers and visual differentiation between players and future picks."
  - "Requirements explicitly preserve per-pick identity rather than allowing aggregated draft-capital rendering."
  - "Requirements define first-pass default lane ordering well enough to avoid reopening core layout semantics during planning."
  - "Requirements define fallback label behavior and default identity-marker composition well enough for layout planning."
  - "Requirements freeze viewport/windowing and chronology-axis expectations strongly enough for layout-contract and navigation planning."
  - "Requirements identify the intended relationship between full-ten-year completeness and usability/readability."
  - "Requirements identify whether the initial product focus remains a standalone story page even if it later sits within a broader publication shell."
  - "Requirements list unresolved decisions explicitly instead of burying them in implementation assumptions."

open_questions:
  - "What exact field names and normalization rules should the separate layout-oriented contract expose for lane ordering, compaction positions, label anchor hints, identity-marker hints, minimap segments, and viewport defaults?"
  - "Which layout behaviors should be frozen as data-driven in the layout contract versus left as frontend interaction state?"
  - "Which editorial overlays are mandatory in the first polished release: chapters only, annotations, calendar markers, game overlays, eras, or some subset?"
  - "Should the current Stage 8 codebase be incrementally evolved or treated as mostly disposable prototype code?"

freeze:
  ready_for_plan: true
  blockers:
    - "No blocking product questions remain for planning; remaining open questions are implementation-shaping rather than requirements-blocking."
