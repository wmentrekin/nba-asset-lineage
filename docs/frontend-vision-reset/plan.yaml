artifact: plan
feature: "frontend-vision-reset"
status: draft
owner_skill: plan
based_on: "docs/frontend-vision-reset/requirements.yaml"

summary:
  objective: "Replace the current Stage 8 sample-data frontend with a graph-dominant Astro experience that consumes real Memphis data through Stage 6 presentation exports plus a new layout-oriented contract, then renders a full-ten-year horizontal asset graph with minimap-assisted navigation."
  design_overview: "Keep lineage truth in Stage 6, keep editorial context additive in Stage 7, and introduce a bounded layout-oriented artifact as the source of graph composition truth on top of Stage 6 semantics. The first implementation is SVG-first and consumes repo-locally generated exports in Astro. The graph exists across the full ten-year chronology, but the default viewport reveals a bounded 120-180 day window with monthly minor ticks and season-boundary major ticks. Implementation proceeds in bounded phases: Stage 6 gap audit, minimum layout-contract specification, deterministic export generation, real-data frontend wiring, scene primitives, graph rendering, navigation/minimap, selective overlays, and full-density hardening."

decisions:
  - "Stage 6 remains the source of lineage truth; the frontend must not re-infer continuity, clustering, or lane semantics client-side."
  - "The Stage 6 gap question is already resolved for this plan: no Stage 6 contract change is required for the first implementation because the Stage 6 presentation export already carries the Memphis transaction grouping key consumed by layout export; same-day grouped events and pick-to-player transitions are treated as fully representable through the separate layout-oriented contract."
  - "A new layout-oriented contract will sit between Stage 6/7 outputs and the Stage 8 renderer."
  - "That layout-oriented contract is limited to graph composition truth: lane order, compaction/reflow positions, same-day event clustering, label anchors, identity-marker hints, minimap segments, and viewport defaults."
  - "Stage 7 remains authoritative for editorial content; any chapter-derived focus copied into the layout contract is derived projection, not a new editorial source of truth."
  - "The current Stage 8 sample-data slice is mostly disposable scaffold. Only tactical harness pieces may be reused; the scene/layout/rendering path is expected to be replaced."
  - "The first-pass lane prominence heuristic uses Memphis tenure, with later editorial refinement deferred."
  - "The frontend should render a graph-dominant horizontal narrative traversal with minimap jumping, not a generic longform article with an embedded chart."
  - "The first implementation traversal model is horizontal-scroll-first: the chart advances through horizontal viewport progression, chapters adjust focus windows/emphasis, and minimap jumps reposition the same viewport model rather than introducing an alternate navigation mode."
  - "Identity remains attached to strands via traveling headshot-plus-text markers; when inline labels cannot fit, the left traveling identity marker remains visible."
  - "Draft picks remain individual strands. Protections and swaps are pick properties; pick-to-player conversion renders as a one-to-one draft transition."
  - "The first implementation is SVG-first."
  - "The frontend consumes repo-local generated export artifacts rather than checked-in generated files or runtime fetching."
  - "Generated files under `frontend/src/data/generated/` are derived build inputs, should remain ignored/generated, and must be regenerated by repo-local export commands before frontend build/test workflows that depend on fresh data."
  - "The canonical regeneration sequence for this phase is fixed: `mise run stage6_export`, `mise run stage8_layout_export`, then `mise run stage8_chapter_export`."
  - "The default visible window is approximately 120 to 180 days, with zoom controlling narrower or broader windows."
  - "The default first-load window is frozen to the earliest chronology slice: `layout_meta.default_window_start` equals export `start_date`, and `layout_meta.default_window_end` is the earliest date no more than 180 days after `start_date`."
  - "Zoom policy is frozen as follows: the default window comes from `layout_meta.default_window_start` and `layout_meta.default_window_end`; chapter focus may provide an optional `default_zoom`; frontend interaction state may zoom no wider than 180 days and no narrower than 30 days in the first implementation."
  - "Chronology uses one day as the base unit, monthly minor ticks, and season-boundary major ticks where `season_boundary` is frozen to July 1 of each league year in the rendered range, clipped to the export bounds. Optional later overlays for league milestone dates remain out of scope."
  - "The first-release overlay scope for this phase is `story_chapters` only. Annotations, calendar markers, game overlays, and eras are out of scope for implementation until a later plan explicitly adds them."
  - "Minimap segments are data-driven chronology windows derived from `layout_meta` bounds and default viewport width: each segment represents one contiguous jump window spanning the default window width, stepping forward by one-half window overlap unless clipped at the end bound."
  - "The `lane_layout` record unit is frozen as one row per rendered strand segment, not one row per asset overall."
  - "Chapter navigation/focus source of truth is `chapter_layout`; `editorial-chapters.json` is presentation text plus chapter identity/order only."
  - "Local headshot-backed identity markers are supported through repo-local fixtures under `frontend/public/headshots/`, but fixture resolution is driven by the contract-owned `identity_marker.image_path` field rather than any unstated `asset_id` to `player_id` lookup in the frontend."
  - "Temporary-state collapse/defer is frozen to explicitly short-term roster states only: 10-day contracts and hardship-style temporary roster states when distinguishable in upstream or derived metadata. Standard roster players, two-way players, and future draft assets are never collapsible in this phase."
  - "Same-day clustering is frozen as follows using Stage 6-visible inputs only: non-trade same-day events always remain separate by `event_id`; trade events on the same date collapse into one cluster only when their Stage 6 presentation nodes share the same `transaction_group_key` carried in presentation payload/export metadata. Disjoint grouping keys remain separate clusters."

contracts:
  interfaces:
    - "New redesign CLI/export surface for the layout-oriented artifact adjacent to Stage 6/7 export commands rather than embedded in frontend-only code. Planned commands: `build-layout-contract`, `validate-layout-contract`, and `export-layout-contract`."
    - "Frontend data-loading interface should accept repo-local generated `presentation-contract.json` plus `layout-contract.json`, with chapter data joined from Stage 7 export."
    - "Minimap/chapter navigation should consume pre-resolved layout/chapter focus hints rather than deriving viewport logic ad hoc in the client."
    - "Chapter-only export interface should emit `frontend/src/data/generated/editorial-chapters.json` as the sole Stage 7 payload consumed in this phase, but only for visible chapter text/order content."
  schemas:
    - "Add a new layout artifact with top-level groups `layout_meta`, `lane_layout`, `event_layout`, `label_layout`, and `chapter_layout`."
    - "`layout_meta` required fields and types: `start_date` (ISO date), `end_date` (ISO date), `default_window_start` (ISO date), `default_window_end` (ISO date), `default_day_width` (number of pixels per day), `axis_strategy` (object with `minor_tick_unit: month`, `major_tick_unit: season_boundary`, `season_boundary_rule: july_1`), `minimap_segments` (array of minimap segment objects)."
    - "`lane_layout` required fields and types: `segment_id` (string, unique per rendered strand segment), `asset_id` (string), `lane_group` (enum `main_roster|two_way|future_picks`), `date_start` (ISO date), `date_end` (ISO date), `display_rank` (integer), `band_slot` (integer), `compaction_group` (string or null), `continuity_anchor` (string), `entry_slot` (integer), `exit_slot` (integer), `identity_marker` (object with `label_text` string, `image_path` string or null, `marker_variant` enum `headshot_text|text_only`). One asset may emit multiple `lane_layout` rows when rendered as multiple Memphis-visible segments."
    - "`event_layout` required fields and types: `event_id` (string), `cluster_id` (string), `cluster_date` (ISO date), `cluster_order` (integer), `junction_type` (enum `transaction|draft_transition|state_boundary`), `member_event_ids` (array of Stage 6 `event_id` strings represented by the cluster), `connected_asset_ids` (array of asset_id strings), `incoming_slots` (map of segment_id to integer slot), `outgoing_slots` (map of segment_id to integer slot), `transition_anchors` (array of objects with `segment_id`, `asset_id`, `anchor_date`, `from_slot`, `to_slot`), `transition_links` (array of objects with `transition_link_id`, `source_segment_id`, `target_segment_id`, `source_asset_id`, `target_asset_id`, `link_type` enum `same_asset|pick_to_player|event_transition`)."
    - "`label_layout` required fields and types: `segment_id` (string referencing `lane_layout.segment_id`), `asset_id` (string), `date_start` (ISO date), `date_end` (ISO date), `inline_label_allowed` (boolean), `label_priority` (integer), `fallback_marker_required` (boolean), `marker_side` (enum `left`). Label rows are per rendered strand segment."
    - "`chapter_layout` required fields and types: `story_chapter_id` (string), `window_start` (ISO date), `window_end` (ISO date), `highlight_asset_ids` (array of asset_id strings), `highlight_event_ids` (array of event_id strings), `minimap_anchor_id` (string), `default_zoom` (integer days or null). This artifact is the sole source of truth for chapter focus, highlight targets, minimap anchor linkage, and default zoom."
    - "Chapter-only export required fields and types: `story_chapter_id` (string), `slug` (string), `chapter_order` (integer), `title` (string), `body` (string), `start_date` (ISO date), `end_date` (ISO date). It does not own focus/navigation semantics."
    - "Canonical example `layout_meta`: `{start_date, end_date, default_window_start, default_window_end, default_day_width, axis_strategy: {minor_tick_unit: month, major_tick_unit: season_boundary, season_boundary_rule: july_1}, minimap_segments: [{segment_id, start_date, end_date, anchor_date, label}]}`."
    - "Canonical example `chapter_layout`: `{story_chapter_id, window_start, window_end, highlight_asset_ids, highlight_event_ids, minimap_anchor_id, default_zoom}`."
    - "Normalization rules are frozen as follows: `display_rank` is lower-is-higher prominence ordered first by Memphis tenure descending, then asset label ascending, then asset_id ascending; `band_slot` is 0-indexed within each `lane_group`; `compaction_group` groups simultaneously compacting lanes within one same-day transaction cluster; `continuity_anchor` is stable across related `segment_id` rows for the same visible strand family; `entry_slot` and `exit_slot` define the start and end vertical slot for each strand segment interval; `transition_anchors` define all fluid upward compaction/reflow geometry needed by the renderer so the client does not infer slot motion; `transition_links` define deterministic strand continuity across event clusters, including cross-asset transitions such as pick-to-player conversion, and every rendered continuity hop crossing a cluster boundary must be represented by exactly one `transition_link`; `cluster_order` is derived from the earliest Stage 6 canonical event order represented in the cluster, with grouped same-day trade clusters inheriting the minimum canonical order among member events and disjoint same-day clusters sorted ascending by that derived value; same-day trade clustering is derived only from shared Stage 6 `transaction_group_key` values plus same-date membership; `identity_marker.image_path` is a repo-local static path or null; `minimap_segments` are derived from `start_date`, `end_date`, and default window width as overlapping contiguous chronology windows stepping by half-window increments, with `segment_id`, `start_date`, `end_date`, `anchor_date`, and human-readable `label`; `chapter_layout.default_zoom` is expressed in integer days, clamped to the 30-180 day range, and when null the frontend preserves the current viewport or default window unchanged."
    - "Headshot/identity-marker sourcing is frozen as follows: during layout export generation, the export/validation layer resolves whether a local fixture exists by consulting `configs/data/stage8_headshot_manifest.yaml`, keyed by `asset_id`, with values equal to repo-local static paths such as `headshots/<slug>.png` under `frontend/public/`. If the manifest has no entry or the referenced file is missing, export generation coerces `identity_marker.image_path` to `null` before writing the contract, and validation asserts that no non-null path points to a missing local file. No runtime fetching is allowed. The first implementation must exercise at least one positive local-headshot path and one text-only fallback path."
    - "Stage 6 owns: semantic nodes, edges, lanes, same-day canonical order, lane-group eligibility, and asset continuity truth."
    - "The layout contract owns: display ranking, band slots, compaction groups, transaction clusters, label eligibility hints, identity-marker hints, minimap anchors, default viewport bounds, and chronology axis hints."
    - "The chapter-only export owns: chapter ordering, slug, and visible chapter text/title/body content only."
    - "Frontend interaction state owns only: current viewport position, current zoom within allowed bounds, active hover/selection, and active chapter emphasis."
  config_changes:
    - "Replace sample-contract assumptions in `frontend/` with a real generated data path."
    - "Add build/test task(s) for generating and validating the new layout artifact before frontend rendering."
    - "Preserve Node >= 18.20.8 frontend constraints and existing Astro integration."
    - "Use a repo-local generated export workflow that produces `frontend/src/data/generated/presentation-contract.json`, `frontend/src/data/generated/layout-contract.json`, and `frontend/src/data/generated/editorial-chapters.json` for Astro consumption."
    - "Keep `frontend/src/data/generated/` ignored/generated and regenerate it through repo-local export commands rather than committing the artifacts."
    - "Add stable tasks `stage8_layout_export` and `stage8_chapter_export` alongside `stage6_export`."
    - "Reserve `frontend/public/headshots/` for optional local player headshot fixtures used by traveling identity markers in this phase."
    - "Track `configs/data/stage8_headshot_manifest.yaml` as the sole source of truth for optional local headshot fixture mapping in this phase."

tasks:
  - id: "T1"
    title: "Codify Frozen Contract Boundary"
    objective: "Write the already-approved Stage 6 versus layout-contract versus frontend-state boundary into durable docs so implementation starts from fixed ownership rules rather than rediscovering them."
    owned_scope:
      - "docs/frontend-vision-reset/stage6-gap-audit.md"
      - "docs/frontend-vision-reset/layout-contract.md"
      - "agent-context/stages/06-presentation-contract.md"
      - "agent-context/stages/08-frontend-vertical-slice.md"
    forbidden_scope:
      - "Do not change canonical lineage semantics."
      - "Do not move layout semantics into Stage 7 editorial content."
      - "Do not introduce new contract decisions; this task records frozen decisions only."
    dependencies: []
    parallelizable: false
    expected_validation:
      - "A committed gap-audit artifact exists at `docs/frontend-vision-reset/stage6-gap-audit.md`."
      - "A committed contract artifact exists at `docs/frontend-vision-reset/layout-contract.md`."
      - "The artifacts explicitly classify each required behavior as: Stage 6 semantic truth, layout-contract truth, or frontend interaction state."
      - "The artifact records the already-frozen plan conclusion that same-day grouped events and pick-to-player transitions remain representable without mutating Stage 6 truth."
      - "T1 is documentation/confirmation only and must not reopen the Stage 6 boundary."

  - id: "T2"
    title: "Implement Layout Models And Export Commands"
    objective: "Implement the frozen layout-contract schema in code and expose deterministic CLI build/validate/export commands for repo-local generated artifacts."
    owned_scope:
      - "src/presentation/models.py"
      - "src/presentation/contract.py"
      - "src/presentation/validate.py"
      - "src/redesign_cli.py"
      - "tests/presentation/"
    forbidden_scope:
      - "Do not enlarge the frozen schema or move semantic truth out of Stage 6."
      - "Do not write frontend rendering code in this task."
    dependencies:
      - "T1"
    parallelizable: false
    expected_validation:
      - "`uv --cache-dir /tmp/uv-cache run python -m redesign_cli --help` shows `build-layout-contract`, `validate-layout-contract`, and `export-layout-contract`."
      - "Targeted pytest coverage exists for frozen layout fields and normalization rules under `tests/presentation/`."
      - "`export-layout-contract` can write `frontend/src/data/generated/layout-contract.json` from real Stage 6/7 data."
      - "Targeted pytest coverage verifies `entry_slot`, `exit_slot`, and `transition_anchors` are present and sufficient for renderer compaction/reflow without client-side invention."
      - "Targeted pytest coverage verifies required asset-class visibility in layout output: active 15-man roster assets, up to 3 two-way assets, and future draft assets remain present, with only allowed temporary cases eligible for collapse/defer."
      - "Targeted pytest coverage verifies cross-artifact contract agreement between `presentation-contract` and `layout-contract` IDs before any frontend task begins."
      - "If T2 exposes a contradiction that truly requires a Stage 6 contract change, work stops and returns to `$refine`; T2 must not silently widen the Stage 6 boundary."
      - "Targeted pytest coverage verifies `identity_marker.image_path` resolution: valid local fixture paths survive export, missing fixtures are coerced to `null`, and no non-null exported path points to a missing file."
      - "Targeted pytest coverage verifies same-day clustering semantics using the Stage 6 `transaction_group_key`: disjoint same-day trade grouping keys remain separate clusters, while shared grouping keys produce one `cluster_id`."
      - "Targeted pytest coverage verifies `transition_links` are present and sufficient to render same-asset continuity and pick-to-player transitions without frontend-side semantic inference."
      - "Targeted pytest coverage verifies every `transition_link` references existing `lane_layout.segment_id` values, preserves member-event linkage through `member_event_ids`, and fully covers cluster-boundary strand continuity with no renderer-side guessing."

  - id: "T3"
    title: "Wire Repo-Local Generated Data Artifacts"
    objective: "Implement the repo-local generated export workflow for Stage 6 presentation data, layout-contract data, and chapter-only editorial data consumed by Astro."
    owned_scope:
      - "src/redesign_cli.py"
      - "mise.toml"
      - "configs/data/stage8_headshot_manifest.yaml"
      - "frontend/src/data/generated/"
      - "frontend/public/headshots/"
      - "tests/presentation/"
      - "tests/editorial/"
    forbidden_scope:
      - "Do not modify SQL; SQL is out of scope for this task."
      - "Do not build frontend scene or rendering code here."
    dependencies:
      - "T2"
    parallelizable: false
    expected_validation:
      - "The canonical regeneration workflow is explicit and working: `mise run stage6_export`, `mise run stage8_layout_export`, then `mise run stage8_chapter_export` produce files under `frontend/src/data/generated/`."
      - "A documented smoke workflow regenerates all three artifacts locally with no missing IDs or broken joins."
      - "Only `story_chapters` are emitted into `frontend/src/data/generated/editorial-chapters.json` for this phase."
      - "Generated artifact lifecycle is documented and enforced: artifacts are regenerated before frontend checks/tests and are not treated as tracked source files."
      - "At least one local headshot fixture exists under `frontend/public/headshots/`, and at least one player-backed marker path resolves to that fixture while another player-backed marker exercises text-only fallback."
      - "Before any frontend task begins, the repo-local export workflow is demonstrated to be feasible in current tooling by running the full regeneration sequence successfully from this repo."
      - "Frontend build/test flows fail loudly on invalid generated data rather than silently masking it."
      - "Targeted pytest coverage verifies cross-artifact agreement between `presentation-contract`, `layout-contract`, and `editorial-chapters` after the chapter export workflow is introduced."
      - "Documented smoke/regeneration evidence for this task is recorded in `docs/frontend-vision-reset/task-smokes/T3-generated-data-workflow.md`."

  - id: "T4"
    title: "Switch Frontend To Real Generated Data"
    objective: "Replace the sample-contract path in the current Astro app with real Stage 6 plus layout-artifact data loading, with chapter data loaded but no chapter UI or navigation behavior introduced yet."
    owned_scope:
      - "frontend/src/pages/index.astro"
      - "frontend/src/lib/timeline.ts"
      - "frontend/src/lib/timeline.test.ts"
    forbidden_scope:
      - "Do not finalize the new graph renderer in this task."
      - "Do not keep sample data as the primary source path."
      - "Do not implement chapter UI, chapter focus behavior, or minimap behavior in this task."
    dependencies:
      - "T3"
    parallelizable: false
    expected_validation:
      - "`npm run check` and `npm run build` in `frontend/` succeed against the repo-local generated data path."
      - "A frontend smoke workflow loads `frontend/src/data/generated/presentation-contract.json`, `layout-contract.json`, and `editorial-chapters.json` without missing asset/event/chapter references."
      - "A targeted frontend test confirms `asset_id` continuity survives data loading without `player_id` shortcuts."
      - "Documented smoke evidence for this task is recorded in `docs/frontend-vision-reset/task-smokes/T4-frontend-real-data-load.md`."

  - id: "T5"
    title: "Build Scene Primitives From Layout Contract"
    objective: "Replace client-derived row/tick/focus logic with non-interactive scene primitives that consume the layout artifact directly."
    owned_scope:
      - "frontend/src/lib/timeline.ts"
      - "frontend/src/lib/timeline.test.ts"
    forbidden_scope:
      - "Do not finalize strand/junction rendering in this task."
      - "Do not implement interactive viewport, zoom, or traversal semantics in this task."
      - "Do not expand into full publication-shell work."
    dependencies:
      - "T3"
      - "T4"
    parallelizable: false
    expected_validation:
      - "`frontend/src/lib/timeline.test.ts` covers layout-contract consumption without re-deriving composition semantics."
      - "Tested scene APIs expose band visibility, chronology primitives, and minimap segment data for later rendering/navigation tasks."

  - id: "T6"
    title: "Implement Base Graph Renderer"
    objective: "Build the graph-dominant renderer around the new scene primitives for strand continuity, junction behavior, and lane-band rendering only."
    owned_scope:
      - "frontend/src/pages/index.astro"
      - "frontend/src/lib/timeline.ts"
      - "frontend/src/lib/timeline.test.ts"
    forbidden_scope:
      - "Do not create alternate semantic clustering rules in the client."
      - "Do not implement label/identity-marker behavior in this task."
      - "Do not add full navigation/minimap logic yet."
    dependencies:
      - "T5"
    parallelizable: false
    expected_validation:
      - "`npm run test` in `frontend/` covers known Memphis cases for strand continuity, multi-asset trade junctions, same-day grouped events, and pick-to-player conversion."
      - "`npm run build` emits `frontend/dist/index.html`, and a documented smoke pass confirms main roster, two-way, and future-pick bands remain visible and differentiated."
      - "The documented smoke pass confirms required asset coverage remains visible: active 15-man roster, up to 3 two-way assets, and future draft assets, with no hidden required asset class."
      - "Documented smoke evidence for this task is recorded in `docs/frontend-vision-reset/task-smokes/T6-base-graph-renderer.md`."

  - id: "T7"
    title: "Implement Label And Identity Marker Behavior"
    objective: "Add inline strand labels and traveling headshot-plus-text identity markers using the frozen layout hints and fallback rules."
    owned_scope:
      - "frontend/src/pages/index.astro"
      - "frontend/src/lib/timeline.ts"
      - "frontend/src/lib/timeline.test.ts"
    forbidden_scope:
      - "Do not change base strand/junction semantics."
      - "Do not add navigation/minimap logic yet."
    dependencies:
      - "T6"
    parallelizable: false
    expected_validation:
      - "`npm run test` in `frontend/` verifies inline label eligibility, fallback-marker behavior, and traveling identity-marker rendering."
      - "A documented smoke pass on the built page confirms compressed strands still retain visible left traveling identity markers, at least one player-backed marker renders with a local headshot plus text, and fallback text-only markers render when no local headshot exists."
      - "Documented smoke evidence for this task is recorded in `docs/frontend-vision-reset/task-smokes/T7-label-and-identity.md`."

  - id: "T8"
    title: "Implement Viewport Traversal And Axis Behavior"
    objective: "Implement horizontal-scroll-first viewport traversal, default window behavior, zoom handling, and layout-driven monthly/season-boundary axis ticks."
    owned_scope:
      - "frontend/src/pages/index.astro"
      - "frontend/src/lib/timeline.ts"
      - "frontend/src/lib/timeline.test.ts"
    forbidden_scope:
      - "Do not add chapter or minimap integration in this task."
      - "Do not alter graph semantics."
    dependencies:
      - "T7"
    parallelizable: false
    expected_validation:
      - "Validation mode is frozen for this task: targeted `frontend/src/lib/timeline.test.ts` coverage plus documented manual smoke on the built page; no new browser/e2e harness is introduced in this phase."
      - "`frontend/src/lib/timeline.test.ts` proves horizontal scroll progression, zoom bounds, and default 120-180 day viewport behavior."
      - "Documented manual smoke on the built page confirms monthly minor ticks and July 1 season-boundary major ticks appear from layout-driven chronology data."
      - "Tests confirm viewport traversal does not alter canonical or layout truth, only viewport state."
      - "Documented smoke evidence for this task is recorded in `docs/frontend-vision-reset/task-smokes/T8-viewport-and-axis.md`."

  - id: "T9"
    title: "Implement Chapter Navigation And Minimap Integration"
    objective: "Implement chapter focus windows, minimap-assisted jumping, and graph-adjacent chapter navigation behavior on top of the viewport model."
    owned_scope:
      - "frontend/src/pages/index.astro"
      - "frontend/src/lib/timeline.ts"
      - "frontend/src/lib/timeline.test.ts"
    forbidden_scope:
      - "Do not add annotations, calendar markers, game overlays, or eras in this phase."
      - "Do not recreate the prior sidebar/context-heavy composition."
      - "Do not alter viewport/axis semantics already established in T8."
    dependencies:
      - "T8"
    parallelizable: false
    expected_validation:
      - "Validation mode is frozen for this task: targeted `frontend/src/lib/timeline.test.ts` coverage plus documented manual smoke on the built page; no new browser/e2e harness is introduced in this phase."
      - "`frontend/src/lib/timeline.test.ts` proves chapter focus windows and minimap jumps operate on the existing viewport model."
      - "A documented smoke interaction path on the built page confirms chapter navigation changes viewport/focus predictably and minimap jumps land on the intended chronology windows."
      - "No non-chapter overlay payload is consumed by the frontend in this phase."
      - "Documented smoke evidence for this task is recorded in `docs/frontend-vision-reset/task-smokes/T9-chapter-and-minimap.md`."

  - id: "T10"
    title: "Integrate Chapter Presentation Layer"
    objective: "Integrate `story_chapters` as visible graph-adjacent presentation content after chapter navigation exists, without adding any non-chapter overlays."
    owned_scope:
      - "frontend/src/pages/index.astro"
    forbidden_scope:
      - "Do not add annotations, calendar markers, game overlays, or eras in this phase."
      - "Do not recreate the prior sidebar/context-heavy composition."
      - "Do not change chapter focus/navigation semantics already established in T9."
    dependencies:
      - "T9"
    parallelizable: false
    expected_validation:
      - "Validation mode is frozen for this task: targeted frontend unit coverage where applicable plus documented manual smoke on the built page; no new browser/e2e harness is introduced in this phase."
      - "Targeted frontend tests prove chapter presentation remains additive and non-destructive."
      - "A documented smoke render confirms chapter body/title context is visible without obscuring the graph."
      - "No non-chapter overlay payload is consumed by the frontend in this phase."
      - "Documented smoke evidence for this task is recorded in `docs/frontend-vision-reset/task-smokes/T10-chapter-presentation.md`."

  - id: "T11"
    title: "Full-Dataset Density And Performance Hardening"
    objective: "Validate and harden the final graph on the full ten-year Memphis dataset for readability, density, and acceptable performance without changing frozen contract or layout policy."
    owned_scope:
      - "frontend performance/readability tuning"
      - "frontend/src/pages/index.astro"
      - "frontend/src/lib/timeline.ts"
      - "frontend/src/lib/timeline.test.ts"
      - "full-dataset smoke and regression tests"
    forbidden_scope:
      - "Do not broaden product scope into mobile-perfect or publication-shell work."
      - "Do not introduce semantic hacks to hide upstream data/model issues."
      - "Do not change the frozen layout-contract schema, minimap construction rule, or chronology-axis policy in this task."
    dependencies:
      - "T9"
      - "T10"
    parallelizable: false
    expected_validation:
