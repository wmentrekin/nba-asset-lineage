    - "frontend/src/lib/timeline.ts"
    - "frontend/src/lib/timeline.test.ts"
  forbidden:
    - "Do not change base strand/junction semantics."
    - "Do not add navigation/minimap logic yet."
    - "Do not modify backend Python/SQL/CLI/data-generation code."
    - "Do not modify files outside owned scope."

implementation_notes:
  - "Use `label_layout` and `identity_marker` hints from the generated layout contract as the source of truth."
  - "Implement inline labels only where the layout/geometry allows them; preserve left traveling identity markers when inline labels cannot fit."
