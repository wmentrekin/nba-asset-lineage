validation_expected:
  - "`mise exec node@22 -- npm run test -- src/lib/timeline.test.ts` passes."
  - "`mise exec node@22 -- npm run build` succeeds and emits `frontend/dist/index.html`."
  - "Targeted frontend tests cover known Memphis cases for strand continuity, multi-asset trade junctions, same-day grouped events, and pick-to-player conversion."
  - "The rendered output keeps main-roster, two-way, and future-pick bands visible and differentiated."

escalate_if:
  - missing_context
  - conflicting_artifacts
  - product_or_architecture_guess_required
  - scope_expansion_required
